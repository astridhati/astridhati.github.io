<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio di disegni e illustrazioni">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Navigazione principale">
      <div id="nav-menu" class="nav-menu">
        <div class="nav-links">
          <a href="#about" class="nav-link">Chi sono</a>
          <a href="#projects" class="nav-link">Progetti</a>
          <a href="#gallery" class="nav-link">Galleria</a>
          <a href="#contact" class="nav-link">Contatti</a>
        </div>
      </div>
      <a href="#hero" class="nav-logo" id="nav-logo">
        <img id="nav-logo-image" class="nav-logo-image" src="" alt="">
      </a>
      <div class="nav-controls">
        <div id="nav-actions" class="nav-actions" aria-label="Social e contatti"></div>
        <button
          type="button"
          id="nav-toggle"
          class="nav-toggle"
          aria-expanded="false"
          aria-controls="nav-menu"
          aria-label="Apri menu"
        >
          <span class="nav-toggle-bar" aria-hidden="true"></span>
          <span class="nav-toggle-bar" aria-hidden="true"></span>
          <span class="nav-toggle-bar" aria-hidden="true"></span>
        </button>
      </div>
    </nav>
  </header>

  <main>
    <section id="hero" class="hero" aria-label="Introduzione">
      <div class="hero-overlay" aria-hidden="true"></div>
    </section>

    <!-- <div class="section-divider" aria-hidden="true"></div> -->

    <section id="about" class="about section" aria-labelledby="about-title">
      <div class="container">
        <h2 id="about-title" class="section-title">Chi sono</h2>
        <p id="about-bio" class="about-bio"></p>
      </div>
    </section>

    <div class="section-divider" aria-hidden="true"></div>

    <section id="projects" class="projects section" aria-labelledby="projects-title">
      <div class="container">
        <h2 id="projects-title" class="section-title">Progetti</h2>
        <div class="projects-carousel" id="projects-carousel" aria-roledescription="carousel" aria-label="Progetti" tabindex="0">
          <div class="projects-carousel__viewport">
            <div id="projects-grid" class="projects-carousel__track" role="list"></div>
          </div>
          <div class="projects-carousel__controls" hidden>
            <button type="button" class="projects-carousel__arrow projects-carousel__arrow--prev" aria-label="Progetto precedente">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="projects-carousel__dots" role="tablist" aria-label="Seleziona progetto"></div>
            <button type="button" class="projects-carousel__arrow projects-carousel__arrow--next" aria-label="Progetto successivo">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- <div class="section-divider" aria-hidden="true"></div> -->

    <section id="gallery" class="gallery section" aria-labelledby="gallery-title">
      <div class="container">
        <h2 id="gallery-title" class="section-title">Galleria</h2>
        <div id="gallery-filters" class="gallery-filters" role="group" aria-label="Filtra per progetto"></div>
        <div id="gallery-grid" class="gallery-grid" role="list"></div>
      </div>
    </section>

    <div class="section-divider" aria-hidden="true"></div>

    <section id="contact" class="contact section" aria-labelledby="contact-title">
      <div class="container">
        <h2 id="contact-title" class="section-title">Contatti</h2>
        <p class="contact-intro">Per commissioni o collaborazioni, scrivimi.</p>
        <a id="contact-email" class="contact-button" href="#">Scrivimi un'email</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="footer-year"></span> <span id="footer-name"></span></p>
  </footer>

  <dialog id="lightbox" class="lightbox" aria-labelledby="lightbox-title">
    <button type="button" class="lightbox-close" aria-label="Chiudi">&times;</button>
    <figure class="lightbox-figure">
      <div class="lightbox-carousel">
        <button type="button" class="lightbox-nav lightbox-nav--prev" aria-label="Immagine precedente" hidden>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="lightbox-stage">
          <img id="lightbox-image" class="lightbox-image" src="" alt="">
          <div id="lightbox-dots" class="lightbox-dots" role="tablist" aria-label="Immagini del gruppo" hidden></div>
        </div>
        <button type="button" class="lightbox-nav lightbox-nav--next" aria-label="Immagine successiva" hidden>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <figcaption class="lightbox-caption">
        <h3 id="lightbox-title" class="lightbox-title"></h3>
        <p id="lightbox-description" class="lightbox-description"></p>
        <p id="lightbox-year" class="lightbox-year"></p>
      </figcaption>
    </figure>
  </dialog>

  <script src="js/main.js" defer></script>
</body>
</html>
