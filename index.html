<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio di disegni e illustrazioni">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Navigazione principale">
      <div id="nav-menu" class="nav-menu">
        <div class="nav-links">
          <a href="#about" class="nav-link">Chi sono</a>
          <a href="#projects" class="nav-link">Progetti</a>
          <a href="#gallery" class="nav-link">Galleria</a>
          <a href="#contact" class="nav-link">Contatti</a>
        </div>
      </div>
      <a href="#hero" class="nav-logo" id="nav-logo">
        <img id="nav-logo-image" class="nav-logo-image" src="" alt="">
      </a>
      <div class="nav-controls">
        <div id="nav-actions" class="nav-actions" aria-label="Social e contatti"></div>
        <button
          type="button"
          id="nav-toggle"
          class="nav-toggle"
          aria-expanded="false"
          aria-controls="nav-menu"
          aria-label="Apri menu"
        >
          <span class="nav-toggle-bar" aria-hidden="true"></span>
          <span class="nav-toggle-bar" aria-hidden="true"></span>
          <span class="nav-toggle-bar" aria-hidden="true"></span>
        </button>
      </div>
    </nav>
  </header>

  <main>
    <section id="hero" class="hero" aria-label="Introduzione">
      <div class="hero-overlay" aria-hidden="true"></div>
    </section>

    <section id="about" class="about section" aria-labelledby="about-title">
      <div class="container">
        <h2 id="about-title" class="section-title">Chi sono</h2>
        <p id="about-bio" class="about-bio"></p>
      </div>
    </section>

    <section id="projects" class="projects section" aria-labelledby="projects-title">
      <div class="container">
        <h2 id="projects-title" class="section-title">Progetti</h2>
        <div id="projects-grid" class="projects-grid" role="list"></div>
      </div>
    </section>

    <section id="gallery" class="gallery section" aria-labelledby="gallery-title">
      <div class="container">
        <h2 id="gallery-title" class="section-title">Galleria</h2>
        <div id="gallery-filters" class="gallery-filters" role="group" aria-label="Filtra per progetto"></div>
        <div id="gallery-grid" class="gallery-grid" role="list"></div>
      </div>
    </section>

    <section id="contact" class="contact section" aria-labelledby="contact-title">
      <div class="container">
        <h2 id="contact-title" class="section-title">Contatti</h2>
        <p class="contact-intro">Per commissioni o collaborazioni, scrivimi.</p>
        <a id="contact-email" class="contact-button" href="#">Scrivimi un'email</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="footer-year"></span> <span id="footer-name"></span></p>
  </footer>

  <dialog id="lightbox" class="lightbox" aria-labelledby="lightbox-title">
    <button type="button" class="lightbox-close" aria-label="Chiudi">&times;</button>
    <figure class="lightbox-figure">
      <img id="lightbox-image" class="lightbox-image" src="" alt="">
      <figcaption class="lightbox-caption">
        <h3 id="lightbox-title" class="lightbox-title"></h3>
        <p id="lightbox-description" class="lightbox-description"></p>
        <p id="lightbox-year" class="lightbox-year"></p>
      </figcaption>
    </figure>
  </dialog>

  <script src="js/main.js" defer></script>
</body>
</html>
